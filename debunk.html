<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <span class="logo-char">民</span><span class="logo-char accent">声</span>
      <span class="logo-divider">|</span>
      <span class="logo-sub">中国社会经济观察</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">首页</a></li>
      <li><a href="analysis.html">深度分析</a></li>
      <li><a href="polls.html">民意调查</a></li>
      <li><a href="trends.html">热点追踪</a></li>
      <li><a href="debunk.html" class="active">辟谣曝光</a></li>
      <li><a href="discuss.html">公共讨论</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
  </div>
</nav>

<section class="page-hero debunk-hero">
  <div class="page-hero-bg">
    <div class="hero-orb orb-red-1"></div>
    <div class="hero-orb orb-red-2"></div>
  </div>
  <div class="container">
    <div class="page-hero-content">
      <span class="section-tag warning-tag">⚠️ 辟谣曝光</span>
      <h1>以事实对抗<br><span class="gradient-text-red">虚假信息</span></h1>
      <p>严格核实数据来源，还原真实情况<br>打击网络谣言与虚假信息传播</p>
    </div>
    <div class="debunk-meta-bar">
      <div class="dmb-item green">
        <span class="dmb-icon">✅</span>
        <span class="dmb-num" id="debunkedCount">0</span>
        <span>已辟谣</span>
      </div>
      <div class="dmb-item red">
        <span class="dmb-icon">🚨</span>
        <span class="dmb-num" id="exposedCount">0</span>
        <span>已曝光</span>
      </div>
      <div class="dmb-item amber">
        <span class="dmb-icon">🔍</span>
        <span class="dmb-num" id="investigatingCount">0</span>
        <span>调查中</span>
      </div>
    </div>
  </div>
</section>

<!-- Filter -->
<div class="filter-bar">
  <div class="container">
    <div class="filter-group">
      <span class="filter-label">类型筛选：</span>
      <div class="filter-tags" id="debunkFilter">
        <button class="filter-tag active" data-type="all">全部</button>
        <button class="filter-tag green-tag" data-type="debunked">✅ 已辟谣</button>
        <button class="filter-tag red-tag" data-type="exposed">🚨 曝光</button>
        <button class="filter-tag amber-tag" data-type="investigating">🔍 调查中</button>
      </div>
      <div class="filter-group">
        <span class="filter-label">话题：</span>
        <div class="filter-tags">
          <button class="filter-tag active" data-cat="all">全部话题</button>
          <button class="filter-tag" data-cat="education">教育</button>
          <button class="filter-tag" data-cat="healthcare">医疗</button>
          <button class="filter-tag" data-cat="housing">住房</button>
          <button class="filter-tag" data-cat="employment">就业</button>
          <button class="filter-tag" data-cat="food">食品</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Debunk List -->
<section class="section">
  <div class="container">
    <div class="debunk-full-list" id="debunkFullList"></div>
  </div>
</section>

<!-- Submit Report -->
<section class="section">
  <div class="container">
    <div class="report-card">
      <div class="report-header">
        <span class="report-icon">📢</span>
        <div>
          <h3>举报虚假信息</h3>
          <p>发现社会经济相关的谣言或虚假报道？请提交线索，我们将认真核实</p>
        </div>
      </div>
      <div class="report-form">
        <div class="report-form-row">
          <div class="form-group">
            <label>谣言/虚假信息内容</label>
            <textarea id="reportContent" placeholder="请描述您发现的谣言或虚假信息内容..." rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>来源/传播渠道</label>
            <input type="text" id="reportSource" placeholder="如：微信群、微博、抖音等">
          </div>
        </div>
        <div class="report-form-row">
          <div class="form-group">
            <label>涉及话题</label>
            <select id="reportTopic">
              <option value="">请选择</option>
              <option>教育</option>
              <option>医疗</option>
              <option>住房</option>
              <option>就业</option>
              <option>食品安全</option>
              <option>养老</option>
              <option>科技</option>
              <option>其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>您的联系方式（可选，用于跟进核实）</label>
            <input type="text" id="reportContact" placeholder="邮箱或其他联系方式">
          </div>
        </div>
        <button class="btn btn-danger" onclick="submitReport()">提交举报</button>
        <div id="reportFeedback" class="suggest-feedback hidden"></div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025 民声 · 中国社会经济观察平台 | <a href="index.html">返回首页</a></p>
    </div>
  </div>
</footer>

<button class="back-to-top" id="backToTop">↑</button>

<script src="js/main.js"></script>
<script src="js/polls.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  renderDebunkList();
  setupDebunkFilter();
});

function setupDebunkFilter() {
  document.querySelectorAll('#debunkFilter .filter-tag').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#debunkFilter .filter-tag').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      filterDebunkList(this.dataset.type);
    });
  });
}

function filterDebunkList(type) {
  document.querySelectorAll('.debunk-item-full').forEach(item => {
    item.style.display = (type === 'all' || item.dataset.type === type) ? '' : 'none';
  });
}

function submitReport() {
  const content = document.getElementById('reportContent').value.trim();
  if (!content) { alert('请填写谣言内容'); return; }
  const feedback = document.getElementById('reportFeedback');
  feedback.innerHTML = '✅ <strong>感谢您的举报！</strong>我们将认真核实您提供的线索，情况属实将在本页发布辟谣信息。';
  feedback.classList.remove('hidden');
  document.getElementById('reportContent').value = '';
  document.getElementById('reportSource').value = '';
  setTimeout(() => feedback.classList.add('hidden'), 8000);
}
</script>
</body>
</html>
